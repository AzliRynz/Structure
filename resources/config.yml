# ╔══════════════════════════════════════════════════════╗
# ║           Structure Plugin - Konfigurasi             ║
# ╚══════════════════════════════════════════════════════╝

# Prefix pesan plugin
prefix: "§8[§6Structure§8] §r"

# ── Auto Spawn (spawn otomatis saat chunk baru di-generate) ──────────────────
auto-spawn:
  enabled: false  # Ubah ke true untuk mengaktifkan

  # Kemungkinan spawn per 10.000 chunk yang di-generate
  # Contoh: chance 5 = 5/10.000 = 0.05% per chunk
  structures:
    DesertTemple:
      chance: 8       # Hanya muncul di biome gurun
    JungleTemple:
      chance: 5
    WitchHut:
      chance: 6
    Igloo:
      chance: 4
    OceanRuin:
      chance: 10
    PillagerOutpost:
      chance: 3
    Stronghold:
      chance: 1       # Sangat jarang
    Village:
      chance: 7
    NetherFortress:
      chance: 5
    EndCity:
      chance: 2

# ── Pengaturan Loot ───────────────────────────────────────────────────────────
loot:
  multiplier: 1.0     # Kalikan jumlah loot (1.0 = normal, 2.0 = double loot)
  bonus-on-difficulty:
    easy:   0.8
    normal: 1.0
    hard:   1.3

# ── Logging ───────────────────────────────────────────────────────────────────
debug: false    # Log detail setiap spawn ke console
